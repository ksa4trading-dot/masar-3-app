<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>شمندى</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --green:#0F6E56;--green-mid:#1D9E75;--green-dark:#085041;
  --blue:#1a5fa8;
  --bg:#f5f5f7;--card:#ffffff;
  --text:#1c1c1e;--text2:#6d6d72;--text3:#aeaeb2;
  --border:#d1d1d6;
  --danger-bg:#fde8e8;--danger-border:#f5c6c6;--danger-text:#7b1c1c;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}

/* ── Wrap ── */
.wrap{width:100%;max-width:390px;padding:0 20px 48px;}

/* ── Hero ── */
.hero{
  display:flex;flex-direction:column;align-items:center;
  padding:56px 0 40px;
  position:relative;
}
.hero-bg{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(29,158,117,.08) 0%,transparent 70%);
  pointer-events:none;
}
.logo-wrap{
  position:relative;
  width:80px;height:80px;
  margin-bottom:20px;
}
.logo-ring{
  position:absolute;inset:-6px;
  border-radius:28px;
  background:linear-gradient(145deg,rgba(29,158,117,.18),rgba(8,80,65,.06));
  animation:ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
.logo-box{
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(145deg,#1D9E75,#085041);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 32px rgba(15,110,86,.3),0 4px 12px rgba(15,110,86,.15);
  position:relative;z-index:1;
}
.logo-box i{font-size:36px;color:#fff;}
.app-name{
  font-size:30px;font-weight:800;color:var(--text);
  letter-spacing:-1px;margin-bottom:6px;
  background:linear-gradient(135deg,#0F6E56,#1a5fa8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.app-sub{
  font-size:13px;color:var(--text2);text-align:center;
  line-height:1.6;max-width:260px;
}
.season-badge{
  margin-top:14px;
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(15,110,86,.08);border:0.5px solid rgba(15,110,86,.2);
  border-radius:20px;padding:4px 12px;
  font-size:11px;color:var(--green);font-weight:600;
  letter-spacing:.3px;
}
.season-badge i{font-size:12px;}

/* ── Form Card ── */
.form-card{
  background:var(--card);
  border-radius:var(--r-xl);
  padding:24px 20px 20px;
  box-shadow:0 2px 12px rgba(0,0,0,.06),0 0 0 0.5px rgba(0,0,0,.04);
  margin-bottom:12px;
}
.form-title{
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:18px;text-align:center;
}

/* ── Field ── */
.fld{margin-bottom:14px;}
.fld:last-child{margin-bottom:0;}
.fld label{
  font-size:12px;color:var(--text2);display:block;
  margin-bottom:6px;font-weight:500;
}
.fi{position:relative;}
.fi input{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:13px 14px 13px 44px;
  font-size:15px;color:var(--text);
  font-family:var(--font);
  outline:none;
  -webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
.fi input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(29,158,117,.1);
  background:#fff;
}
.fi input::placeholder{color:var(--text3);}
.fic{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--text3);pointer-events:none;
  transition:color .15s;
}
.fi input:focus ~ .fic{color:var(--green);}
.eyebtn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:17px;padding:4px;border-radius:6px;
  transition:color .15s;
}
.eyebtn:hover{color:var(--text2);}

/* ── Error ── */
.err{
  display:none;
  background:var(--danger-bg);border:0.5px solid var(--danger-border);
  border-radius:var(--r-md);padding:10px 14px;
  font-size:12px;color:var(--danger-text);
  margin-bottom:12px;align-items:center;gap:8px;
}
.err.on{display:flex;}
.err i{font-size:16px;flex-shrink:0;}

/* ── Submit Button ── */
.btn{
  width:100%;padding:15px;
  border-radius:var(--r-md);border:none;
  font-size:15px;font-weight:600;font-family:var(--font);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--green-mid),var(--green-dark));
  color:#fff;
  box-shadow:0 4px 16px rgba(15,110,86,.28),0 1px 4px rgba(15,110,86,.1);
  transition:opacity .15s,transform .1s;
  position:relative;overflow:hidden;
}
.btn::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 100%);
}
.btn:active{transform:scale(.98);opacity:.9;}
.btn i{font-size:18px;}

/* ── Footer ── */
.foot{
  text-align:center;margin-top:20px;
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.foot i{font-size:13px;}

/* ── Loading Overlay ── */
.loading{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:200;
}
.loading.on{display:flex;}
.load-box{
  background:rgba(255,255,255,.12);
  border:0.5px solid rgba(255,255,255,.2);
  border-radius:18px;padding:28px 36px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.spin{
  width:38px;height:38px;
  border:2.5px solid rgba(255,255,255,.18);
  border-top-color:#fff;
  border-radius:50%;
  animation:sp .75s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;color:rgba(255,255,255,.85);font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-box"><i class="ti ti-bus-stop"></i></div>
    </div>
    <div class="app-name">شمندى</div>
    <div class="app-sub">نظام إدارة نقل حجاج بيت الله الحرام</div>
    <div class="season-badge"><i class="ti ti-calendar-event"></i>موسم 1447</div>
  </div>

  <div class="err" id="err">
    <i class="ti ti-alert-circle"></i>
    <span id="err-txt">—</span>
  </div>

  <div class="form-card">
    <div class="form-title">تسجيل الدخول</div>
    <div class="fld">
      <label>رقم الهوية</label>
      <div class="fi">
        <input type="tel" inputmode="numeric" id="inp-id"
               placeholder="أدخل رقم الهوية الوطنية" maxlength="10"/>
        <i class="ti ti-id-badge fic"></i>
      </div>
    </div>
    <div class="fld">
      <label>رقم الجوال</label>
      <div class="fi">
        <input type="password" inputmode="numeric" id="inp-pass"
               placeholder="أدخل رقم الجوال" maxlength="15"/>
        <i class="ti ti-lock fic"></i>
        <button class="eyebtn" onclick="togPass()" aria-label="إظهار/إخفاء">
          <i class="ti ti-eye" id="eye-ic"></i>
        </button>
      </div>
    </div>
  </div>

  <button class="btn" onclick="doLogin()">
    <i class="ti ti-login"></i>
    <span>دخول</span>
  </button>

  <div class="foot">
    <i class="ti ti-shield-lock"></i>
    <span>اتصال آمن · وزارة الحج والعمرة</span>
  </div>
</div>

<div class="loading" id="loading">
  <div class="load-box">
    <div class="spin"></div>
    <div class="ltxt">جاري التحقق...</div>
  </div>
</div>

<script>
let passVis=false;
function togPass(){
  passVis=!passVis;
  document.getElementById("inp-pass").type=passVis?"text":"password";
  document.getElementById("eye-ic").className="ti "+(passVis?"ti-eye-off":"ti-eye");
}

function callScript(action, payload = {}) {
  return new Promise(resolve => {
    try {
      google.script.run
        .withSuccessHandler(r => {
          let result = r;
          if (typeof r === "string") {
            try { result = JSON.parse(r); } catch(e) { result = null; }
          }
          if (result === null || result === undefined) {
            result = { success: false, error: "رد فارغ من الخادم" };
          }
          resolve(result);
        })
        .withFailureHandler(err => {
          resolve({ success: false, error: err.message || "فشل الاتصال بالخادم" });
        })
        .handleAction(action, JSON.stringify(payload));
    } catch (e) {
      resolve({ success: false, error: e.message });
    }
  });
}

function showErr(msg){
  document.getElementById("err-txt").textContent=msg;
  document.getElementById("err").className="err on";
}

async function doLogin(){
  document.getElementById("err").className="err";
  const idV=document.getElementById("inp-id").value.trim();
  const pwV=document.getElementById("inp-pass").value.trim();
  if(idV.length<9||pwV.length<9){showErr("يرجى إدخال رقم الهوية ورقم الجوال كاملاً");return;}
  document.getElementById("loading").className="loading on";
  const r=await callScript("login",{userId:idV,mobile:pwV});
  document.getElementById("loading").className="loading";
  if(!r.success){showErr(r.error||"بيانات غير صحيحة");return;}
  sessionStorage.setItem("mashir_user",   JSON.stringify(r));
  sessionStorage.setItem("mashir_season", String(r.season_id||1));
  sessionStorage.setItem("mashir_phase",  "null");
  sessionStorage.setItem("mashir_phases", "[]");
  sessionStorage.setItem("mashir_cfg",    '{"bus_scan":true,"driver_scan":false,"guide_scan":true,"pilgrim_count":true}');
  Promise.all([
    callScript("getServiceConfig",{seasonId:r.season_id||1}),
    callScript("getActivePhases",{seasonId:r.season_id||1}),
  ]).then(([cfgR,phR])=>{
    if(cfgR.success&&cfgR.config) sessionStorage.setItem("mashir_cfg",JSON.stringify(cfgR.config));
    if(phR.success&&phR.phases&&phR.phases.length){
      sessionStorage.setItem("mashir_phase",  JSON.stringify(phR.phases[0]));
      sessionStorage.setItem("mashir_phases", JSON.stringify(phR.phases));
    }
  });
  const pages={garage_admin:"garage",monitor:"monitor",road_monitor:"road",admin:"dashboard",management:"dashboard",supervisor:"dashboard"};
  const page=pages[r.role];
  if(!page){showErr("دور غير معروف: "+r.role);return;}
  google.script.run
    .withSuccessHandler(url=>window.location.href=url)
    .getPageUrl(page);
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
</script>
</body>
</html>
